<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #00ff88;
    --accent2: #00ccff;
    --text: #e8e8e8;
    --muted: #555;
    --highlight: #ffcc00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(0,255,136,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,204,255,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 700px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease both;
  }

  .title-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }

  .logo {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    object-fit: contain;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px;
  }

  .logo-fallback {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: linear-gradient(135deg, #00ff88, #00ccff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    pointer-events: none;
    opacity: 0.5;
  }

  #searchInput {
    width: 100%;
    padding: 14px 16px 14px 44px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
  }

  #searchInput::placeholder { color: var(--muted); }

  /* Stats bar */
  .stats {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 4px;
    min-height: 18px;
    animation: fadeDown 0.6s 0.15s ease both;
  }

  /* Layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  /* Results list */
  .results-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }

  #resultsList {
    list-style: none;
    overflow-y: auto;
    height: 340px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #resultsList::-webkit-scrollbar { width: 4px; }
  #resultsList::-webkit-scrollbar-track { background: transparent; }
  #resultsList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  #resultsList li {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #resultsList li:hover { background: var(--surface2); }

  #resultsList li.active {
    background: rgba(0,255,136,0.08);
    color: var(--accent);
    border-left: 2px solid var(--accent);
  }

  .item-icon { font-size: 0.8rem; opacity: 0.7; flex-shrink: 0; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    text-align: center;
    padding: 20px;
  }

  .empty-state .big { font-size: 2rem; }

  /* Info panel */
  .info-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .info-header {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .info-icon { font-size: 1.1rem; }

  .info-title {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--highlight);
  }

  .info-body {
    padding: 14px;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #ccc;
    font-family: 'Space Mono', monospace;
    overflow-y: auto;
    flex: 1;
    height: 340px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .info-body::-webkit-scrollbar { width: 4px; }
  .info-body::-webkit-scrollbar-track { background: transparent; }
  .info-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .info-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--muted);
    font-size: 0.75rem;
    text-align: center;
  }

  .info-placeholder .big { font-size: 2rem; }

  /* Number info */
  .num-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }

  .num-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }

  .num-card .label {
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .num-card .value {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent);
    word-break: break-all;
  }

  /* Category tags */
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .tag-fruit { background: rgba(255,100,100,0.15); color: #ff8888; border: 1px solid rgba(255,100,100,0.3); }
  .tag-veg { background: rgba(100,220,100,0.15); color: #88dd88; border: 1px solid rgba(100,220,100,0.3); }
  .tag-lang { background: rgba(0,200,255,0.15); color: #66ddff; border: 1px solid rgba(0,200,255,0.3); }
  .tag-element { background: rgba(255,200,0,0.15); color: #ffcc44; border: 1px solid rgba(255,200,0,0.3); }
  .tag-bio { background: rgba(180,100,255,0.15); color: #cc88ff; border: 1px solid rgba(180,100,255,0.3); }
  .tag-number { background: rgba(0,255,136,0.15); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }

  /* Footer */
  .footer {
    margin-top: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    animation: fadeDown 0.6s 0.3s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 560px) {
    .main { grid-template-columns: 1fr; }
    #resultsList, .info-body { height: 220px; }
    h1 { font-size: 1.5rem; }
  }
</style>

  "Cell": "The cell is the basic structural and functional unit of all forms of life. The term comes from the Latin word cellula meaning 'small room'. A biological cell consists of a semipermeable cell membrane enclosing cytoplasm that contains genetic material. Most cells are only visible under a microscope. Cells emerged on Earth about 4 billion years ago.",
  "DNA": "Deoxyribonucleic acid (DNA) is a polymer composed of two polynucleotide chains that coil around each other to form a double helix. The polymer carries genetic instructions for the development, functioning, growth and reproduction of all known organisms and many viruses. DNA and ribonucleic acid (RNA) are nucleic acids, one of the four major types of macromolecules essential for all known forms of life.",

function getCategory(key) {
  if (FRUITS.has(key)) return 'fruit';
  if (LANG_KEYS.has(key)) return 'lang';
  if (ELEMENTS.has(key)) return 'element';
  if (BIO_KEYS.has(key)) return 'bio';
  return 'veg';
}

function getCategoryIcon(key) {
  if (FRUITS.has(key)) return '🍎';
  if (LANG_KEYS.has(key)) return '💻';
  if (ELEMENTS.has(key)) return '⚗️';
  if (BIO_KEYS.has(key)) return '🧬';
  return '🥦';
}

function getCategoryLabel(key) {
  if (FRUITS.has(key)) return 'Fruit';
  if (LANG_KEYS.has(key)) return 'Language';
  if (ELEMENTS.has(key)) return 'Element';
  if (BIO_KEYS.has(key)) return 'Biology';
  return 'Vegetable';
}

function isPrime(n) {
  if (n < 2) return false;
  for (let i = 2; i <= Math.sqrt(n); i++) {
    if (n % i === 0) return false;
  }
  return true;
}

function factorial(n) {
  if (n > 20) return 'Too large to display';
  let result = BigInt(1);
  for (let i = 2; i <= n; i++) result *= BigInt(i);
  return result.toString();
}

const searchInput = document.getElementById('searchInput');
const resultsList = document.getElementById('resultsList');
const infoBody = document.getElementById('infoBody');
const infoHeader = document.getElementById('infoHeader');
const infoIcon = document.getElementById('infoIcon');
const infoTitle = document.getElementById('infoTitle');
const stats = document.getElementById('stats');

let currentResults = [];
let activeIndex = -1;

function renderResults(term) {
  resultsList.innerHTML = '';
  currentResults = [];
  activeIndex = -1;

  if (!term.trim()) {
    stats.textContent = 'Type to search across all categories';
    resultsList.innerHTML = '<li style="padding:0;border:0"><div class="empty-state"><div class="big">🔎</div><div>Start typing to search</div></div></li>';
    return;
  }

  const lower = term.toLowerCase();

  // Number match
  const num = parseInt(term, 10);
  if (!isNaN(num) && String(num) === term.trim()) {
    currentResults.push({ type: 'number', key: String(num) });
  }

  // Data match
  for (const key of Object.keys(data)) {
    if (key.toLowerCase().includes(lower)) {
      currentResults.push({ type: 'data', key });
    }
  }

  if (currentResults.length === 0) {
    stats.textContent = 'No results found';
    resultsList.innerHTML = '<li style="padding:0;border:0"><div class="empty-state"><div class="big">😶</div><div>No results for "' + term + '"</div></div></li>';
    return;
  }

  stats.textContent = `${currentResults.length} result${currentResults.length !== 1 ? 's' : ''} found`;

  currentResults.forEach((item, i) => {
    const li = document.createElement('li');
    if (item.type === 'number') {
      li.innerHTML = `<span class="item-icon">🔢</span>${item.key}`;
    } else {
      const icon = getCategoryIcon(item.key);
      li.innerHTML = `<span class="item-icon">${icon}</span>${item.key}`;
    }
    li.addEventListener('click', () => selectItem(i));
    resultsList.appendChild(li);
  });
}

function selectItem(index) {
  activeIndex = index;
  const items = resultsList.querySelectorAll('li');
  items.forEach((li, i) => li.classList.toggle('active', i === index));

  const item = currentResults[index];
  if (!item) return;

  if (item.type === 'number') {
    const n = parseInt(item.key, 10);
    const even = n % 2 === 0 ? 'Even' : 'Odd';
    const prime = isPrime(n) ? 'Prime ✅' : 'Not Prime ❌';
    const sq = n * n;
    const sqrt = Math.sqrt(n).toFixed(4);
    const fact = factorial(n);

    infoHeader.style.display = 'flex';
    infoIcon.textContent = '🔢';
    infoTitle.textContent = `Number: ${n}`;

    infoBody.innerHTML = `
      <span class="tag tag-number">Number</span>
      <div class="num-grid">
        <div class="num-card"><div class="label">Even / Odd</div><div class="value">${even}</div></div>
        <div class="num-card"><div class="label">Prime</div><div class="value">${prime}</div></div>
        <div class="num-card"><div class="label">Square</div><div class="value">${sq}</div></div>
        <div class="num-card"><div class="label">Square Root</div><div class="value">${sqrt}</div></div>
        <div class="num-card" style="grid-column:1/-1"><div class="label">Factorial</div><div class="value" style="font-size:0.75rem">${fact}</div></div>
      </div>
    `;
  } else {
    const key = item.key;
    const info = data[key] || 'No information available.';
    const cat = getCategory(key);
    const icon = getCategoryIcon(key);
    const label = getCategoryLabel(key);

    infoHeader.style.display = 'flex';
    infoIcon.textContent = icon;
    infoTitle.textContent = key;

    infoBody.innerHTML = `<span class="tag tag-${cat}">${label}</span><br>${info}`;
  }
}

searchInput.addEventListener('input', () => {
  renderResults(searchInput.value);
  // auto-select first result
  if (currentResults.length > 0) selectItem(0);
});

searchInput.focus();
</script>
